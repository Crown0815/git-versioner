name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Format code
      run: cargo fmt -- --check
    - name: Inspect code
      run: |
        cargo clippy --version
        cargo clippy --all-targets -- -D warnings

  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - name: Run tests
      run: cargo test
    - name: Run GitHub Action
      id: versioner
      uses: ./
      with:
        as-release: true
    - name: Assert GitHub Action outputs
      run: |
        echo "${{ fromJSON(steps.versioner.outputs) }}"
        test -n "${{ steps.versioner.outputs.SemVer }}"
        test -n "${{ steps.versioner.outputs.GitVersion_SemVer }}"
    - name: Determine version
      run: | 
        cargo run
        echo "Contents of GITHUB_OUTPUT:"
        cat $GITHUB_OUTPUT
