name: Rust

on:
  push:
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Format code
      run: cargo fmt -- --check
    - name: Inspect code
      run: |
        cargo clippy --version
        cargo clippy --all-targets -- -D warnings

  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - name: Run tests
      run: cargo test
    - name: Determine version
      run: | 
        cargo run
        echo "Contents of GITHUB_OUTPUT:"
        cat $GITHUB_OUTPUT

  test-action:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - name: Run GitHub Action
      id: basic
      uses: ./
      with:
        main-branch: ${{ github.ref_name }}

    - name: Run GitHub Action (as release)
      id: release
      uses: ./
      with:
        as-release: 'true'
        main-branch: ${{ github.ref_name }}

    - name: Run GitHub Action (customized)
      id: customized
      uses: ./
      with:
        pre-release-tag: 'alpha'
        main-branch: ${{ github.ref_name }}

    - name: Assert GitHub Action outputs
      run: |
        test "${{ steps.basic.outputs.PreReleaseLabel }}" = "pre"
        test "${{ steps.release.outputs.PreReleaseLabel }}" = ""
        test "${{ steps.customized.outputs.PreReleaseLabel }}" = "alpha"
